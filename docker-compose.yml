version: '3.8'

services:
  # Servidor de Base de Datos (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: facadmin_dev_db
    restart: always
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password_2026
      POSTGRES_DB: facadmin_inventario
    ports:
      - "5432:5432"
    volumes:
      # Mapeamos los datos a una carpeta local fuera de Git para no perderlos al apagar el contenedor
      - ./docker/postgres/data:/var/lib/postgresql/data
    networks:
      - facadmin_network

  # API Backend (Node.js)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: facadmin_dev_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://dev_user:dev_password_2026@db:5432/facadmin_inventario?schema=public
      - NODE_ENV=development
    volumes:
      # Mapeo de volumen dinámico para Hot-Reload
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - db
    networks:
      - facadmin_network

  # Interfaz Frontend (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: facadmin_dev_frontend
    restart: always
    ports:
      - "5173:5173" # Puerto por defecto de Vite
    volumes:
      # Mapeo de volumen dinámico para Hot-Reload
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - facadmin_network

networks:
  facadmin_network:
    driver: bridge